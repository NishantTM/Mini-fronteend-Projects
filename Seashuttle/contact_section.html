    <section id="contact" class="contact-section">
        <h2 class="contactheading-section">
            CONTACT
        </h2>
        <div class="parent-subheading">

            <div class="map">
                <iframe
                    src="https://maps-cdn.cdn-files-a.com/include/globalMapDisplay.php?q=Afstralias+54%2C+Rhodes%2C+Greece&z=15&l=en&ilfc="
                    style="border:0;" loading="lazy">
                </iframe>

            </div>

            <div class="child-subheading">

                <div class="top-info-row">
                    <div class="child-textes">
                        <span class="label-title">Email</span>
                        <span class="label-title">Contact Info</span>
                    </div>

                    <div class="child-addressnontext">
                        <span class="label-title">Address</span>
                        <span>Afstralias 54, Rhodes, Greece</span>
                        <span>Always Open</span>
                    </div>
                </div>

                <form class="child-textfieldes">

                    <div class="input-row">
                        <div class="child-textboxes">
                            <label for="name">Name</label>
                            <input type="text" name="name" id="name" placeholder="Name">
                        </div>
                        <div class="child-textboxes">
                            <label for="phone">Phone</label>
                            <input type="text" name="phone" id="phone" placeholder="Phone">
                        </div>
                    </div>

                    <div class="child-textboxes full-width">
                        <label for="emailaddress">Email Address</label>
                        <input type="email" name="emailaddress" id="emailaddress" placeholder="Email address">
                    </div>

                    <div class="child-textboxes full-width">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" placeholder="Message"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Contact Us</button>

                </form>

            </div>

        </div>

    </section>

</body>
