<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federico's Food | Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>

<body>

    <section class="contact-section">
        <h1 class="section-title">Contact</h1>
        <p class="subtitle">The best Italian Food restaurant</p>

        <form class="contact-form">
            <input type="text" placeholder="Name" required>
            <input type="tel" placeholder="Phone" required>
            <input type="email" placeholder="Email address" required>
            <button type="submit" class="contact-btn">CONTACT US</button>
        </form>

        <div class="contact-info">
            <p><strong>Address:</strong> 14 Brooklyn Avenue, Brooklyn, NY, USA</p>
            <p><strong>Phone:</strong> +1-246-7777-545</p>
            <p><strong>Email:</strong> contact@federicosfood.com</p>
            <p><strong>Hours:</strong> Mon–Fri: 11:00 AM – 10:00 PM<br>Sat–Sun: 12:00 PM – 11:00 PM</p>
        </div>

        <div class="map">
            <iframe src="https://maps-cdn.cdn-files-a.com/include/globalMapDisplay.php?q=Afstralias+54%2C+Rhodes%2C+Greece&z=15&l=en&ilfc=" style="border:0;" loading="lazy">
            </iframe>
        </div>
    </section>

</body>

</html>
